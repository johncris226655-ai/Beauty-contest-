<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K♠ - KING OF HEARTS</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Tektur:wght@400;700&display=swap');

        :root { --bg: #050505; --text: #ffffff; --accent: #ff0000; }
        * { box-sizing: border-box; font-family: 'Tektur', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; text-transform: uppercase; overflow: hidden; }

        /* Spade Fullscreen Button */
        #fs-btn {
            position: fixed; top: 15px; left: 15px; z-index: 9999;
            width: 35px; height: 35px; cursor: pointer;
            background: #000; border: 2px solid #fff;
            clip-path: polygon(50% 0%, 100% 70%, 75% 70%, 75% 100%, 25% 100%, 25% 70%, 0% 70%);
        }

        #role-selector {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }

        .mode-btn { 
            width: 80%; max-width: 300px; padding: 20px; border: 2px solid var(--accent); 
            background: none; color: white; cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 0 15px var(--accent);
        }

        .screen { display: none; flex-direction: column; height: 100vh; padding: 40px; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        /* TV Styling */
        body.is-tv h1 { font-size: 5rem; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        body.is-tv .status-big { font-size: 3.5rem; margin: 20px 0; color: #fff; }
        body.is-tv .target-box { font-size: 6rem; background: #fff; color: #000; padding: 20px 60px; margin-bottom: 30px; border: 4px solid var(--accent); }

        /* Phone Selection Grid */
        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            max-height: 55vh; overflow-y: auto; width: 100%; max-width: 450px;
            padding: 15px; border: 1px solid #444; background: #0a0a0a; margin: 15px 0;
        }
        .num-btn { 
            aspect-ratio: 1; background: #111; border: 1px solid #333; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #fff;
        }
        .num-btn.selected { background: var(--accent); color: white; border-color: #fff; box-shadow: 0 0 15px var(--accent); }

        /* Tables */
        .res-table { width: 100%; max-width: 1200px; border-collapse: collapse; font-size: 2rem; margin-top: 20px; }
        .res-table th { border-bottom: 4px solid var(--accent); padding: 20px; color: var(--accent); }
        .res-table td { padding: 20px; border-bottom: 2px solid #222; }
        .eliminated { color: #444 !important; text-decoration: line-through; }

        /* Rules Overlay */
        #rules-overlay {
            position: fixed; inset: 0; background: #000; z-index: 5000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: var(--accent); padding: 50px; text-align: center;
        }

        .main-btn { background: white; color: black; border: none; padding: 20px; font-weight: bold; width: 100%; max-width: 400px; font-size: 1.2rem; cursor: pointer; margin-top: 15px; }
        .controller-only { display: block; }
        body.is-tv .controller-only { display: none !important; }
        
        input { background: transparent; border: 2px solid #fff; color: #fff; padding: 15px; font-size: 1.5rem; text-align: center; margin-bottom: 20px; width: 80%; }
    </style>
</head>
<body>

    <div id="fs-btn" onclick="toggleFullScreen()"></div>

    <div id="role-selector">
        <h1 style="color:red; text-shadow: 0 0 15px red; font-size: 3rem;">KING OF HEARTS</h1>
        <button class="mode-btn" onclick="init('controller')">CONTROLLER MODE</button>
        <button class="mode-btn" onclick="init('tv')">TV DISPLAY MODE</button>
    </div>

    <div id="rules-overlay">
        <h1 style="font-size: 4rem;">NEW RULE</h1>
        <p id="rule-text" style="font-size: 2.5rem; color: white;"></p>
    </div>

    <div id="game-container">
        <div id="setup-screen" class="screen">
            <h1>REGISTRATION</h1>
            <div class="controller-only">
                <input type="text" id="p-name" placeholder="ENTER PLAYER NAME">
                <button class="main-btn" onclick="addPlayer()">REGISTER</button>
                <button class="main-btn" style="background:red; color:white;" onclick="pushState('turn-screen')">START GAME</button>
            </div>
            <div id="p-list" style="margin-top:40px; font-size:2rem; color:red;"></div>
        </div>

        <div id="turn-screen" class="screen">
            <h1 id="active-p" style="font-size: 4rem;">---</h1>
            <div class="status-big" id="tv-msg">PREPARE</div>
            <p class="controller-only" style="color: #666;">PASS THE PHONE TO THE PLAYER</p>
            <button class="main-btn controller-only" onclick="showSecretPad()">I AM THE PLAYER</button>
        </div>

        <div id="pad-screen" class="screen">
            <h2 id="pad-owner">PICK A NUMBER</h2>
            <div class="grid" id="grid"></div>
            <button class="main-btn" id="lock-btn" disabled onclick="submitChoice()">LOCK SELECTION</button>
        </div>

        <div id="result-screen" class="screen">
            <h1 style="font-size: 3rem;">ROUND RESULTS</h1>
            <div class="target-box" id="target-ui">0.00</div>
            <table class="res-table">
                <thead><tr><th>PLAYER</th><th>NUMBER</th><th>POINTS</th></tr></thead>
                <tbody id="res-body"></tbody>
            </table>
        </div>
    </div>

<script>
    const ABLY_KEY = 'WEUdeg.e-jGzA:u-dLUatgTPRUyLgP--exnIjK_t8UGDRCTsEjE8_PIJo';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('aib-beauty-contest-v2');

    let myRole = '';
    let isChoosing = false; // Flag para hindi mag-sync back ang TV screen sa phone habang pumipili
    let state = {
        screen: 'setup-screen',
        players: [],
        turnIdx: 0,
        target: 0,
        tvMsg: 'WAITING FOR PLAYERS',
        isRuleActive: false
    };

    const tagalogRules = [
        "Kapag may dalawang manlalaro ang pumili ng parehong numero, ang kanilang boto ay walang bisa.",
        "Ang manlalarong may eksaktong -10 na puntos ay agad na papatayin.",
        "Ang sinumang lumagpas sa itinakdang average ay mababawasan ng dalawang puntos.",
        "Kung may pumili ng 0, ang sinumang pumili ng 100 ay panalo agad."
    ];

    channel.subscribe('sync', (msg) => {
        state = msg.data;
        // Kung ang phone ay kasalukuyang nasa "Choosing" mode, huwag baguhin ang screen nito
        if (!(myRole === 'controller' && isChoosing)) {
            render();
        }
    });

    function init(role) {
        myRole = role;
        document.getElementById('role-selector').style.display = 'none';
        if(role === 'tv') document.body.classList.add('is-tv');
        render();
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function speak(text) {
        if (myRole === 'tv') {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'en-US';
            window.speechSynthesis.speak(ut);
        }
    }

    function pushState(screen, extra = {}) {
        state.screen = screen;
        Object.assign(state, extra);
        channel.publish('sync', state);
    }

    function addPlayer() {
        const n = document.getElementById('p-name').value;
        if(!n) return;
        state.players.push({ name: n, points: 0, choice: null, isDead: false });
        document.getElementById('p-name').value = '';
        pushState('setup-screen');
    }

    function showSecretPad() {
        isChoosing = true; // Lock local screen
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('pad-screen').classList.add('active');
        
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let selected = null;
        for(let i=0; i<=100; i++){
            let d = document.createElement('div');
            d.className = 'num-btn'; d.innerText = i;
            d.onclick = () => {
                document.querySelectorAll('.num-btn').forEach(x => x.classList.remove('selected'));
                d.classList.add('selected');
                selected = i;
                state.tempChoice = i;
                document.getElementById('lock-btn').disabled = false;
            };
            grid.appendChild(d);
        }
        
        const pName = state.players[state.turnIdx].name;
        channel.publish('sync', { ...state, tvMsg: `${pName} IS DECIDING...`, tts: `${pName} is deciding` });
    }

    function submitChoice() {
        state.players[state.turnIdx].choice = state.tempChoice;
        state.turnIdx++;
        isChoosing = false; // Release lock

        // Find next alive player
        while(state.turnIdx < state.players.length && state.players[state.turnIdx].isDead) state.turnIdx++;
        
        if(state.turnIdx >= state.players.length) {
            calculate();
        } else {
            pushState('turn-screen', { tvMsg: 'IT IS YOUR TURN' });
        }
    }

    function calculate() {
        const alive = state.players.filter(p => !p.isDead);
        const choices = alive.map(p => p.choice);
        const avg = choices.reduce((a,b)=>a+b, 0) / choices.length;
        const target = (avg * 0.8).toFixed(2);
        
        let elimHappened = false;
        state.players.forEach(p => {
            if(!p.isDead) {
                if(p.choice != Math.round(target)) p.points--;
                if(p.points <= -10) { p.isDead = true; elimHappened = true; }
            }
        });

        pushState('result-screen', { target: target, elimTrigger: elimHappened });

        setTimeout(() => {
            if (state.elimTrigger) {
                showRuleOverlay();
            } else {
                nextRound();
            }
        }, 10000);
    }

    function showRuleOverlay() {
        const rule = tagalogRules[Math.floor(Math.random() * tagalogRules.length)];
        pushState('result-screen', { isRuleActive: true, currentRule: rule });
        setTimeout(() => {
            pushState('result-screen', { isRuleActive: false });
            nextRound();
        }, 30000);
    }

    function nextRound() {
        state.players.forEach(p => p.choice = null);
        state.turnIdx = 0;
        while(state.players[state.turnIdx] && state.players[state.turnIdx].isDead) state.turnIdx++;
        
        if (!state.players[state.turnIdx]) {
            pushState('setup-screen', { players: [] }); // Reset if everyone is dead
        } else {
            pushState('turn-screen', { tvMsg: 'IT IS YOUR TURN' });
        }
    }

    function render() {
        const overlay = document.getElementById('rules-overlay');
        overlay.style.display = state.isRuleActive ? 'flex' : 'none';
        if(state.isRuleActive) document.getElementById('rule-text').innerText = state.currentRule;

        if(state.tts) { speak(state.tts); state.tts = null; }
        if(state.screen === 'turn-screen' && state.tvMsg === 'IT IS YOUR TURN') {
            speak(`${state.players[state.turnIdx]?.name}, it is your turn.`);
        }

        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        let screenToDisplay = state.screen;
        
        // TV should stay on Turn screen during Pad selection
        if(myRole === 'tv' && screenToDisplay === 'pad-screen') screenToDisplay = 'turn-screen';
        
        const activeEl = document.getElementById(screenToDisplay);
        if(activeEl) activeEl.classList.add('active');

        document.getElementById('p-list').innerHTML = state.players.map(p => 
            `<div style="${p.isDead?'color:#444;text-decoration:line-through':'color:white'}">${p.name} [${p.points}]</div>`).join('');

        if(state.players[state.turnIdx]) {
            document.getElementById('active-p').innerText = state.players[state.turnIdx].name;
            document.getElementById('tv-msg').innerText = state.tvMsg;
        }

        if(state.screen === 'result-screen') {
            document.getElementById('target-ui').innerText = state.target;
            document.getElementById('res-body').innerHTML = state.players.map(p => `
                <tr class="${p.isDead ? 'eliminated' : ''}">
                    <td>${p.name}</td>
                    <td>${p.choice ?? '--'}</td>
                    <td>${p.points}</td>
                </tr>
            `).join('');
        }
    }
</script>
</body>
</html>
