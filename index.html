<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE 0.8 | K♠</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* Alice in Borderland Aesthetic */
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;700&display=swap');

        :root { --bg: #000000; --text: #ffffff; --red: #ff0000; --gray: #1a1a1a; }
        * { box-sizing: border-box; font-family: 'Oswald', sans-serif; letter-spacing: 2px; }
        
        body { background: var(--bg); color: var(--text); margin: 0; text-transform: uppercase; overflow: hidden; }

        /* Spade Fullscreen Icon */
        #fs-btn {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            width: 35px; height: 35px; cursor: pointer; background: #fff;
            clip-path: polygon(50% 0%, 100% 70%, 75% 70%, 75% 100%, 25% 100%, 25% 70%, 0% 70%);
        }

        /* Role Selector */
        #role-selector {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .mode-btn { 
            width: 280px; padding: 20px; border: 1px solid #fff; background: none; 
            color: #fff; cursor: pointer; font-size: 1.2rem; margin: 10px; transition: 0.3s;
        }
        .mode-btn:hover { background: #fff; color: #000; }

        .screen { display: none; flex-direction: column; height: 100vh; width: 100vw; padding: 40px; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; }

        h1 { font-size: 4rem; font-weight: 700; margin: 0; color: var(--text); }
        .red-text { color: var(--red); }

        /* Registration */
        input { background: none; border: none; border-bottom: 2px solid #fff; color: #fff; font-size: 1.8rem; text-align: center; width: 80%; outline: none; margin-bottom: 30px; }

        /* Number Grid (Phone Only) */
        .grid-wrapper { flex-grow: 1; overflow-y: auto; width: 100%; max-width: 500px; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px; }
        .num-btn { aspect-ratio: 1; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.2s; }
        .num-btn.selected { background: var(--red); border-color: var(--red); transform: scale(1.1); }

        /* Results Table (TV Only) */
        .res-table { width: 100%; max-width: 1200px; border-collapse: collapse; margin-top: 50px; }
        .res-table th { font-size: 1.5rem; padding: 20px; border-bottom: 2px solid #fff; }
        .res-table td { font-size: 2.5rem; padding: 20px; border-bottom: 1px solid #222; }
        .eliminated { color: #333 !important; text-decoration: line-through; }
        
        /* Rule Overlay */
        #rules-overlay {
            position: fixed; inset: 0; background: #000; z-index: 5000;
            display: none; flex-direction: column; justify-content: center; align-items: center; padding: 60px;
        }
        #rules-overlay h2 { font-size: 3rem; color: var(--red); }
        #rules-overlay p { font-size: 2.5rem; line-height: 1.4; }

        .controller-only { display: block; }
        body.is-tv .controller-only { display: none !important; }
        body.is-tv .tv-extra-large { font-size: 7rem !important; }
    </style>
</head>
<body>

    <div id="fs-btn" onclick="toggleFullScreen()"></div>

    <div id="role-selector">
        <h1 class="red-text">THE 0.8</h1>
        <p>A GAME OF HEARTS</p>
        <button class="mode-btn" onclick="init('controller')">CONTROLLER</button>
        <button class="mode-btn" onclick="init('tv')">TV DISPLAY</button>
    </div>

    <div id="rules-overlay">
        <h2>NEW RULE</h2>
        <p id="rule-text"></p>
    </div>

    <div id="game-container">
        <div id="setup-screen" class="screen">
            <h1>REGISTRATION</h1>
            <div class="controller-only" style="width: 100%;">
                <input type="text" id="p-name" placeholder="ENTER NAME">
                <button class="mode-btn" onclick="addPlayer()">REGISTER</button>
                <button class="mode-btn" style="border-color: red;" onclick="pushState('turn-screen')">START GAME</button>
            </div>
            <div id="p-list" style="margin-top:40px; font-size:1.5rem;"></div>
        </div>

        <div id="turn-screen" class="screen">
            <h1 id="active-p" class="tv-extra-large">---</h1>
            <h2 id="tv-msg" style="font-weight: 300;">PREPARE</h2>
            <div class="controller-only">
                <p>PASS THE PHONE TO THE PLAYER</p>
                <button class="mode-btn" onclick="showSecretPad()">I AM THE PLAYER</button>
            </div>
        </div>

        <div id="pad-screen" class="screen">
            <h1>SELECT NUMBER</h1>
            <div class="grid-wrapper">
                <div class="grid" id="grid"></div>
            </div>
            <button class="mode-btn" id="lock-btn" disabled onclick="submitChoice()">LOCK SELECTION</button>
        </div>

        <div id="result-screen" class="screen">
            <h1 class="red-text" id="target-ui" style="font-size: 8rem;">0.00</h1>
            <table class="res-table">
                <thead><tr><th>PLAYER</th><th>CHOICE</th><th>POINTS</th></tr></thead>
                <tbody id="res-body"></tbody>
            </table>
        </div>

        <div id="phone-wait-screen" class="screen">
            <h1 class="red-text">ROUND ENDED</h1>
            <p>LOOK AT THE TV FOR RESULTS</p>
            <p style="font-size: 0.8rem; color: #444;">NEXT ROUND IS STARTING...</p>
        </div>
    </div>

<script>
    const ABLY_KEY = 'WEUdeg.e-jGzA:u-dLUatgTPRUyLgP--exnIjK_t8UGDRCTsEjE8_PIJo';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('the-0-8-session');

    let myRole = '';
    let state = {
        screen: 'setup-screen',
        players: [],
        turnIdx: 0,
        target: 0,
        tvMsg: 'WAITING',
        isRuleActive: false,
        currentRule: ''
    };

    const rules = [
        "Kapag dalawang manlalaro ang pumili ng parehong numero, invalid ang kanilang boto.",
        "Ang manlalarong aabot sa -10 points ay agad na mae-eliminate.",
        "Sa oras na may ma-eliminate, ang target multiplier ay mananatili sa 0.8.",
        "Ang player na may pinakamalayong sagot sa target ay babawasan ng 1 point."
    ];

    channel.subscribe('sync', (msg) => {
        state = msg.data;
        render();
    });

    function init(role) {
        myRole = role;
        document.getElementById('role-selector').style.display = 'none';
        if(role === 'tv') document.body.classList.add('is-tv');
        render();
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function speak(text) {
        if (myRole === 'tv') {
            const ut = new SpeechSynthesisUtterance(text);
            ut.rate = 0.8;
            window.speechSynthesis.speak(ut);
        }
    }

    function pushState(screen, extra = {}) {
        state.screen = screen;
        Object.assign(state, extra);
        channel.publish('sync', state);
    }

    function addPlayer() {
        const val = document.getElementById('p-name').value;
        if(!val) return;
        state.players.push({ name: val, points: 0, choice: null, isDead: false });
        document.getElementById('p-name').value = '';
        pushState('setup-screen');
    }

    function showSecretPad() {
        // Phone only transition
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('pad-screen').classList.add('active');
        
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=0; i<=100; i++){
            let d = document.createElement('div');
            d.className = 'num-btn'; d.innerText = i;
            d.onclick = () => {
                document.querySelectorAll('.num-btn').forEach(x => x.classList.remove('selected'));
                d.classList.add('selected');
                state.tempChoice = i;
                document.getElementById('lock-btn').disabled = false;
            };
            grid.appendChild(d);
        }
        
        const name = state.players[state.turnIdx].name;
        channel.publish('sync', { ...state, tvMsg: `${name} IS DECIDING...`, tts: `${name} is deciding` });
    }

    function submitChoice() {
        state.players[state.turnIdx].choice = state.tempChoice;
        state.turnIdx++;
        
        while(state.players[state.turnIdx] && state.players[state.turnIdx].isDead) state.turnIdx++;

        if(state.turnIdx >= state.players.length) {
            calculate();
        } else {
            pushState('turn-screen', { tvMsg: 'PREPARE' });
        }
    }

    function calculate() {
        const alive = state.players.filter(p => !p.isDead);
        const choices = alive.map(p => p.choice);
        const avg = choices.reduce((a,b)=>a+b, 0) / choices.length;
        const target = (avg * 0.8).toFixed(2);
        
        let died = false;
        state.players.forEach(p => {
            if(!p.isDead) {
                if(p.choice != Math.round(target)) p.points--;
                if(p.points <= -10) { p.isDead = true; died = true; }
            }
        });

        pushState('result-screen', { target: target, tts: `Target is ${target}` });

        setTimeout(() => {
            if (died) {
                const rule = rules[Math.floor(Math.random() * rules.length)];
                pushState('result-screen', { isRuleActive: true, currentRule: rule });
                setTimeout(() => {
                    pushState('result-screen', { isRuleActive: false });
                    startNextRound();
                }, 30000);
            } else {
                startNextRound();
            }
        }, 10000);
    }

    function startNextRound() {
        state.players.forEach(p => p.choice = null);
        state.turnIdx = 0;
        while(state.players[state.turnIdx] && state.players[state.turnIdx].isDead) state.turnIdx++;
        pushState('turn-screen', { tvMsg: 'PREPARE' });
    }

    function render() {
        // Rules Overlay Sync
        document.getElementById('rules-overlay').style.display = state.isRuleActive ? 'flex' : 'none';
        document.getElementById('rule-text').innerText = state.currentRule;

        // TTS Sync
        if(state.tts) { speak(state.tts); state.tts = null; }
        if(state.screen === 'turn-screen' && state.tvMsg === 'PREPARE') {
            speak(`${state.players[state.turnIdx]?.name}, it is your turn.`);
        }

        // Screen Syncing
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        
        let display = state.screen;
        if(myRole === 'tv') {
            if(display === 'pad-screen') display = 'turn-screen';
        } else {
            // Phone specific views
            if(display === 'result-screen') display = 'phone-wait-screen';
        }
        
        const active = document.getElementById(display);
        if(active) active.classList.add('active');

        // Data Rendering
        document.getElementById('p-list').innerHTML = state.players.map(p => 
            `<div style="color:${p.isDead?'#222':'#fff'}">${p.name} [${p.points}]</div>`).join('');

        if(state.players[state.turnIdx]) {
            document.getElementById('active-p').innerText = state.players[state.turnIdx].name;
            document.getElementById('tv-msg').innerText = state.tvMsg;
        }

        if(state.screen === 'result-screen') {
            document.getElementById('target-ui').innerText = state.target;
            document.getElementById('res-body').innerHTML = state.players.map(p => `
                <tr class="${p.isDead ? 'eliminated' : ''}">
                    <td>${p.name}</td>
                    <td>${p.choice ?? '--'}</td>
                    <td>${p.points}</td>
                </tr>
            `).join('');
        }
    }
</script>
</body>
</html>
