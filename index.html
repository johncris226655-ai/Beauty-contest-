<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K♥ - ULTIMATE CAST</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #ff0000; --gold: #ffd700; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; text-transform: uppercase; }

        /* Full Screen Button */
        #fs-btn { position: fixed; top: 10px; left: 10px; z-index: 9999; background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 5px 10px; cursor: pointer; font-size: 12px; }

        /* Role Selector */
        #mode-selector { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .mode-btn { width: 80%; max-width: 300px; padding: 25px; border: 2px solid white; background: none; color: white; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
        .mode-btn:hover { background: #fff; color: #000; }

        /* Screens */
        .screen { display: none; flex-direction: column; height: 100vh; width: 100vw; padding: 40px; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }

        /* TV DESIGN - FULL CENTERED */
        body.is-tv h1 { font-size: 5rem; letter-spacing: 15px; margin: 0; color: var(--text); }
        body.is-tv .status-msg { font-size: 3.5rem; margin: 30px 0; color: var(--accent); font-weight: bold; }
        body.is-tv .player-name { font-size: 6rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.5); }

        /* Registration List */
        #p-list-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 80%; margin-top: 40px; }
        .p-tag { padding: 15px 30px; border: 2px solid #fff; font-size: 1.5rem; background: rgba(255,255,255,0.1); }

        /* Phone Controller UI */
        .controller-only { display: block; width: 100%; max-width: 400px; }
        body.is-tv .controller-only { display: none !important; }
        input { width: 100%; padding: 20px; font-size: 1.2rem; background: #111; border: 1px solid #fff; color: #fff; margin-bottom: 20px; text-align: center; }

        /* Grid for Phone */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; width: 100%; margin: 20px 0; }
        .num-btn { aspect-ratio: 1; background: #111; border: 1px solid #333; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; }
        .num-btn.selected { background: #fff; color: #000; font-weight: bold; transform: scale(1.1); }

        /* Result Board */
        .res-container { width: 90%; max-width: 1200px; }
        table { width: 100%; border-collapse: collapse; font-size: 1.5rem; }
        th { border-bottom: 4px solid #fff; padding: 20px; }
        td { padding: 20px; border-bottom: 1px solid #333; }
        .winner-row { background: rgba(0,255,0,0.2); color: #0f0; }
        .eliminated-row { color: #555; text-decoration: line-through; opacity: 0.5; }

        .main-btn { background: #fff; color: #000; border: none; padding: 20px; font-weight: bold; width: 100%; font-size: 1.2rem; cursor: pointer; margin-top: 10px; }
        
        /* Pass the phone alert */
        #pass-alert { position: fixed; inset: 0; background: #ff0000; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body onclick="enableAudio()">

    <button id="fs-btn" onclick="toggleFS()">FULLSCREEN</button>

    <div id="mode-selector">
        <h1 style="font-size: 2.5rem; margin-bottom: 30px;">K♥ BEAUTY CONTEST</h1>
        <button class="mode-btn" onclick="initGame('controller')">📱 CONTROLLER</button>
        <button class="mode-btn" onclick="initGame('tv')">📺 TV DISPLAY</button>
    </div>

    <div id="pass-alert">
        <h1 style="font-size: 3rem;">PASS THE PHONE</h1>
        <h2 id="next-player-pass" style="font-size: 2rem;">TO: NAME</h2>
        <button class="main-btn" style="width: 200px;" onclick="closePassAlert()">I AM READY</button>
    </div>

    <div id="game-container">
        <div id="setup-screen" class="screen active">
            <h1>REGISTRATION</h1>
            <div class="controller-only">
                <input type="text" id="p-input" placeholder="ENTER NAME">
                <button class="main-btn" onclick="addPlayer()">ADD PLAYER</button>
                <button class="main-btn" style="background:var(--accent); color:#fff;" onclick="startGame()">START GAME</button>
            </div>
            <div id="p-list-display"></div>
        </div>

        <div id="turn-screen" class="screen">
            <div class="status-msg" id="tv-status">NEXT TURN</div>
            <div class="player-name" id="active-p-name">---</div>
            <div class="controller-only" style="margin-top: 40px;">
                <button class="main-btn" onclick="showPad()">OPEN SELECTION</button>
            </div>
        </div>

        <div id="pad-screen" class="screen controller-only">
            <h2>SELECT YOUR NUMBER</h2>
            <div class="grid" id="pad-grid"></div>
            <button id="lock-btn" class="main-btn" disabled onclick="submitSelection()">LOCK SELECTION</button>
        </div>

        <div id="result-screen" class="screen">
            <h1 style="font-size: 3rem;">ROUND RESULTS</h1>
            <div id="target-box" style="font-size: 3rem; margin: 20px; border: 2px solid #fff; padding: 10px;">TARGET: --</div>
            <div class="res-container">
                <table id="res-table">
                    <thead><tr><th>PLAYER</th><th>CHOICE</th><th>POINTS</th></tr></thead>
                    <tbody id="res-body"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const ABLY_KEY = 'WEUdeg.e-jGzA:u-dLUatgTPRUyLgP--exnIjK_t8UGDRCTsEjE8_PIJo';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('beauty-contest-pro');

    let myRole = '';
    let state = { screen: 'setup-screen', players: [], turnIdx: 0, target: 0, tvMsg: '', lastAnnounced: '' };
    let audioEnabled = false;

    function enableAudio() { audioEnabled = true; }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function initGame(role) {
        myRole = role;
        document.getElementById('mode-selector').style.display = 'none';
        if(role === 'tv') document.body.classList.add('is-tv');
        updateUI();
    }

    function speak(text) {
        if(myRole === 'tv' && audioEnabled) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.rate = 0.9; ut.pitch = 1;
            window.speechSynthesis.speak(ut);
        }
    }

    // --- SYNC ---
    channel.subscribe('sync', (msg) => {
        const oldScreen = state.screen;
        const oldTurn = state.turnIdx;
        state = msg.data;
        
        if(myRole === 'tv') {
            handleAnnouncements(oldScreen, oldTurn);
            if(state.screen === 'result-screen' && oldScreen !== 'result-screen') {
                setTimeout(() => { if(myRole === 'tv') autoNext(); }, 10000);
            }
        }
        updateUI();
    });

    function handleAnnouncements(oldScreen, oldTurn) {
        const currentPlayer = state.players[state.turnIdx];
        if(!currentPlayer) return;

        if(state.screen === 'turn-screen' && (oldTurn !== state.turnIdx || oldScreen !== 'turn-screen')) {
            speak(`${currentPlayer.name}'s turn.`);
        }
        if(state.tvMsg.includes('DECIDING') && !state.lastAnnounced.includes('DECIDING')) {
            speak(`${currentPlayer.name} is deciding.`);
            state.lastAnnounced = 'DECIDING';
        }
    }

    // --- CONTROLLER ACTIONS ---
    function addPlayer() {
        const n = document.getElementById('p-input').value;
        if(!n) return;
        state.players.push({ name: n, points: 0, choice: null, isDead: false });
        document.getElementById('p-input').value = '';
        push();
    }

    function startGame() { push('turn-screen', { tvMsg: 'GAME START' }); }

    function showPad() {
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('turn-screen').classList.remove('active');
        document.getElementById('pad-screen').classList.add('active');
        
        const grid = document.getElementById('pad-grid');
        grid.innerHTML = '';
        let sel = null;
        for(let i=0; i<=100; i++) {
            let b = document.createElement('div');
            b.className = 'num-btn'; b.innerText = i;
            b.onclick = () => {
                document.querySelectorAll('.num-btn').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                sel = i; state.tempChoice = i;
                document.getElementById('lock-btn').disabled = false;
            };
            grid.appendChild(b);
        }
        push(state.screen, { tvMsg: `${state.players[state.turnIdx].name} IS DECIDING...` });
    }

    function submitSelection() {
        state.players[state.turnIdx].choice = state.tempChoice;
        let nextIdx = state.turnIdx + 1;
        
        // Find next alive player
        while(nextIdx < state.players.length && state.players[nextIdx].isDead) { nextIdx++; }

        if(nextIdx >= state.players.length) {
            calculate();
        } else {
            state.turnIdx = nextIdx;
            document.getElementById('next-player-pass').innerText = `TO: ${state.players[nextIdx].name}`;
            document.getElementById('pass-alert').style.display = 'flex';
        }
    }

    function closePassAlert() {
        document.getElementById('pass-alert').style.display = 'none';
        push('turn-screen', { tvMsg: 'IT IS YOUR TURN', lastAnnounced: '' });
    }

    function calculate() {
        const alive = state.players.filter(p => !p.isDead);
        const avg = alive.reduce((a, b) => a + b.choice, 0) / alive.length;
        const target = (avg * 0.8).toFixed(2);
        
        let winName = "NO ONE";
        let minDiff = 999;
        
        state.players.forEach((p, i) => {
            if(!p.isDead) {
                let diff = Math.abs(p.choice - target);
                if(diff < minDiff) { minDiff = diff; winName = p.name; }
                if(p.choice != Math.round(target)) p.points--;
                if(p.points <= -10) p.isDead = true;
            }
        });

        speak(`Round over. Target is ${target}. ${winName} wins the round.`);
        push('result-screen', { target: target, lastAnnounced: 'RESULTS' });
    }

    function autoNext() {
        // Only trigger from controller to avoid sync loops
        // But for auto-TV, we can just wait for the controller to press it
    }

    function nextRound() {
        state.players.forEach(p => p.choice = null);
        let firstAlive = state.players.findIndex(p => !p.isDead);
        push('turn-screen', { turnIdx: firstAlive, tvMsg: 'NEW ROUND' });
    }

    function push(scr = state.screen, extra = {}) {
        state.screen = scr;
        Object.assign(state, extra);
        channel.publish('sync', state);
    }

    function updateUI() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        let cur = state.screen;
        if(myRole === 'tv' && cur === 'pad-screen') cur = 'turn-screen';
        document.getElementById(cur).classList.add('active');

        // Registration List
        document.getElementById('p-list-display').innerHTML = state.players.map(p => 
            `<div class="p-tag" style="${p.isDead ? 'border-color:red; color:red; text-decoration:line-through;' : ''}">${p.name}</div>`
        ).join('');

        // Turn Info
        if(state.players[state.turnIdx]) {
            document.getElementById('active-p-name').innerText = state.players[state.turnIdx].name;
            document.getElementById('tv-status').innerText = state.tvMsg;
        }

        // Results
        if(state.screen === 'result-screen') {
            document.getElementById('target-box').innerText = "TARGET: " + state.target;
            document.getElementById('res-body').innerHTML = state.players.map(p => `
                <tr class="${p.isDead ? 'eliminated-row' : ''}">
                    <td>${p.name} ${p.isDead ? '(ELIMINATED)' : ''}</td>
                    <td>${p.choice ?? '---'}</td>
                    <td>${p.points}</td>
                </tr>
            `).join('');
        }
    }
</script>
</body>
</html>
