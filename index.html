<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K♥ - BEAUTY CONTEST (YOUTUBE-STYLE CAST)</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --bg: #030303; --text: #ffffff; --accent: #ff0000; }
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: var(--bg); color: var(--text); margin: 0; text-transform: uppercase; overflow-x: hidden; }

        /* Role Selector - Initial Screen */
        #role-selector {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .mode-btn { width: 80%; max-width: 300px; padding: 25px; border: 2px solid white; background: none; color: white; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .mode-btn:active { background: white; color: black; }

        /* Containers */
        #game-container { width: 100%; max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; animation: fadeIn 0.4s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* TV UI Scaling */
        body.is-tv #game-container { max-width: 100%; }
        body.is-tv h1 { font-size: 4rem; margin-bottom: 40px; border-bottom: 5px solid white; }
        body.is-tv .status-msg { font-size: 2.5rem; color: #ff0000; margin: 40px 0; }
        body.is-tv .res-row { font-size: 1.8rem; padding: 20px; }
        .controller-only { display: block; }
        body.is-tv .controller-only { display: none !important; }

        /* Number Grid for Phone */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: #333; padding: 2px; border: 1px solid white; margin: 10px 0; }
        .num-btn { aspect-ratio: 1; background: #000; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; border: 1px solid #222; cursor: pointer; }
        .num-btn.selected { background: white; color: black; font-weight: bold; }

        /* Results Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        .winner { background: rgba(255, 255, 255, 0.2); color: #00ff00; }
        .dead { color: #444; text-decoration: line-through; }

        button.main-btn { background: white; color: black; border: none; padding: 18px; font-weight: bold; letter-spacing: 2px; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="role-selector">
        <h1 style="letter-spacing: 5px;">K♥ BEAUTY CONTEST</h1>
        <button class="mode-btn" onclick="initGame('controller')">📱 PHONE MODE<br><small>(Controller)</small></button>
        <button class="mode-btn" onclick="initGame('tv')">📺 TV MODE<br><small>(Display)</small></button>
    </div>

    <div id="game-container">
        <div id="setup-screen" class="screen">
            <h1>REGISTRATION</h1>
            <div class="controller-only">
                <input type="text" id="p-input" placeholder="ENTER PLAYER NAME" style="width:100%; padding:15px; background:#111; border:1px solid white; color:white; margin-bottom:10px;">
                <button class="main-btn" style="width:100%;" onclick="addPlayer()">ADD PLAYER</button>
                <button class="main-btn" style="width:100%; background:red; color:white;" onclick="pushState('turn-screen')">START GAME</button>
            </div>
            <div id="p-list-display" style="margin-top:20px; font-size:1.2rem;"></div>
        </div>

        <div id="turn-screen" class="screen" style="justify-content:center; text-align:center;">
            <h1 id="active-p-name">---</h1>
            <div class="status-msg" id="tv-status">IT IS YOUR TURN</div>
            <p style="color:#666;" class="controller-only">OTHERS LOOK AWAY</p>
            <button class="main-btn controller-only" onclick="showPad()">SELECT NUMBER</button>
        </div>

        <div id="pad-screen" class="screen controller-only">
            <h2 id="pad-owner">SELECT A NUMBER</h2>
            <div class="grid" id="pad-grid"></div>
            <button id="lock-btn" class="main-btn" disabled onclick="submitSelection()">LOCK SELECTION</button>
        </div>

        <div id="result-screen" class="screen">
            <h1>ROUND RESULTS</h1>
            <div id="target-box" style="background:white; color:black; padding:15px; font-size:1.5rem; font-weight:bold; margin-bottom:20px;">TARGET: --</div>
            <div id="res-list"></div>
            <button class="main-btn controller-only" onclick="nextRound()">NEXT ROUND</button>
        </div>
    </div>

<script>
    // --- CONNECTING TO ABLY ---
    const ABLY_KEY = 'WEUdeg.e-jGzA:u-dLUatgTPRUyLgP--exnIjK_t8UGDRCTsEjE8_PIJo';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('game-session-001');

    let myRole = '';
    let state = {
        screen: 'setup-screen',
        players: [],
        turnIdx: 0,
        tvMsg: 'READY TO START',
        target: 0
    };

    // Listen for Sync
    channel.subscribe('sync', (msg) => {
        state = msg.data;
        updateUI();
    });

    function initGame(role) {
        myRole = role;
        document.getElementById('role-selector').style.display = 'none';
        if(role === 'tv') document.body.classList.add('is-tv');
        updateUI();
    }

    function pushState(screenName, extra = {}) {
        state.screen = screenName;
        Object.assign(state, extra);
        channel.publish('sync', state);
    }

    function addPlayer() {
        const name = document.getElementById('p-input').value;
        if(!name) return;
        state.players.push({ name: name, points: 0, choice: null, isDead: false });
        document.getElementById('p-input').value = '';
        pushState('setup-screen');
    }

    function showPad() {
        // Change Phone Screen only
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('pad-screen').classList.add('active');
        
        // Render Grid
        const grid = document.getElementById('pad-grid');
        grid.innerHTML = '';
        let selected = null;
        for(let i=0; i<=100; i++) {
            let b = document.createElement('div');
            b.className = 'num-btn'; b.innerText = i;
            b.onclick = () => {
                document.querySelectorAll('.num-btn').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                selected = i;
                state.tempChoice = i;
                document.getElementById('lock-btn').disabled = false;
            };
            grid.appendChild(b);
        }
        // Tell TV that player is thinking
        channel.publish('sync', { ...state, tvMsg: 'IS CHOOSING...' });
    }

    function submitSelection() {
        state.players[state.turnIdx].choice = state.tempChoice;
        state.turnIdx++;

        if(state.turnIdx >= state.players.length) {
            calculateRound();
        } else {
            pushState('turn-screen', { tvMsg: 'IT IS YOUR TURN' });
        }
    }

    function calculateRound() {
        const alive = state.players.filter(p => !p.isDead);
        const choices = alive.map(p => p.choice);
        const avg = choices.reduce((a, b) => a + b, 0) / choices.length;
        const target = (avg * 0.8).toFixed(2);
        
        state.players.forEach(p => {
            if(!p.isDead && p.choice != Math.round(target)) p.points--;
            if(p.points <= -10) p.isDead = true;
        });

        pushState('result-screen', { target: target, turnIdx: 0 });
    }

    function nextRound() {
        state.players.forEach(p => p.choice = null);
        pushState('turn-screen', { tvMsg: 'IT IS YOUR TURN', turnIdx: 0 });
    }

    function updateUI() {
        // Hide all
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        
        // YouTube-style logic: If phone is on "Pad", TV stays on "Turn"
        let current = state.screen;
        if(myRole === 'tv' && current === 'pad-screen') current = 'turn-screen';
        
        document.getElementById(current).classList.add('active');

        // Sync Data
        document.getElementById('p-list-display').innerHTML = state.players.map(p => `<div>${p.name}</div>`).join('');
        
        if(state.players[state.turnIdx]) {
            document.getElementById('active-p-name').innerText = state.players[state.turnIdx].name;
            document.getElementById('tv-status').innerText = state.tvMsg;
        }

        if(state.screen === 'result-screen') {
            document.getElementById('target-box').innerText = "TARGET: " + state.target;
            document.getElementById('res-list').innerHTML = state.players.map(p => `
                <div class="res-row ${p.isDead ? 'dead' : ''}">
                    ${p.name}: ${p.choice === null ? 'OUT' : p.choice} | PTS: ${p.points}
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
