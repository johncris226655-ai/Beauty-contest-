<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE 0.8 | KING OF DIAMONDS</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=VT323&display=swap');
        :root { --bg: #000; --text: #fff; --red: #ff0000; }
        * { box-sizing: border-box; font-family: 'Oswald', sans-serif; letter-spacing: 2px; }
        body { background: var(--bg); color: var(--text); margin: 0; text-transform: uppercase; overflow: hidden; width: 100vw; height: 100vh; }
        .digital { font-family: 'VT323', monospace; letter-spacing: 0; }
        
        #fs-btn { position: fixed; top: 20px; left: 20px; z-index: 9999; width: 30px; height: 30px; background: #fff; clip-path: polygon(50% 0%, 100% 70%, 75% 70%, 75% 100%, 25% 100%, 25% 70%, 0% 70%); }
        .screen { display: none; flex-direction: column; height: 100vh; width: 100vw; padding: 5vh; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex !important; }
        .mode-btn { width: 280px; padding: 20px; border: 1px solid #fff; background: none; color: #fff; cursor: pointer; font-size: 1.2rem; margin: 10px; }

        /* TV Winboard */
        .players-columns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; max-width: 1200px; margin: 30px 0; }
        .player-entry { font-size: 1.5rem; border: 1px solid #222; padding: 10px; transition: 0.5s; }
        .winner-glow { border-color: #00ff00; box-shadow: inset 0 0 10px #00ff00; }
        .p-stat { display: block; font-size: 1rem; color: #888; }

        /* Elimination */
        .red-line { width: 85%; height: 4px; background: var(--red); margin: 30px 0; box-shadow: 0 0 15px var(--red); }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; height: 50vh; overflow-y: auto; padding: 10px; border: 1px solid #222; width: 100%; }
        .num-btn { aspect-ratio: 1; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .selected { background: var(--red); }
        
        body.is-tv .controller-only { display: none !important; }
    </style>
</head>
<body>
    <div id="fs-btn" onclick="document.documentElement.requestFullscreen()"></div>

    <div id="role-selector" class="screen active">
        <h1 style="color:red; font-size: 4rem;">THE 0.8</h1>
        <button class="mode-btn" onclick="init('controller')">CONTROLLER</button>
        <button class="mode-btn" onclick="init('tv')">TV DISPLAY</button>
    </div>

    <div id="game-container">
        <div id="setup-screen" class="screen">
            <h1>REGISTRATION</h1>
            <div class="controller-only">
                <input type="text" id="p-name" placeholder="NAME" style="background:none; border-bottom:2px solid #fff; color:#fff; font-size:2rem; text-align:center; outline:none; margin-bottom: 20px;">
                <button class="mode-btn" onclick="addPlayer()">ADD</button>
                <button class="mode-btn" style="border-color:red" onclick="pushState('turn-screen')">START</button>
            </div>
            <div id="p-list" style="margin-top:20px;"></div>
        </div>

        <div id="turn-screen" class="screen">
            <h1 id="active-p" style="font-size: 6rem;">---</h1>
            <h2 id="tv-msg">GET READY</h2>
            <div class="controller-only">
                <button class="mode-btn" onclick="openSecretPad()">I AM READY</button>
            </div>
        </div>

        <div id="pad-screen" class="screen">
            <h1 class="digital">SELECT NUMBER</h1>
            <div class="grid" id="grid"></div>
            <button class="mode-btn" id="lock-btn" disabled onclick="submitChoice()">LOCK</button>
        </div>

        <div id="result-screen" class="screen">
            <h1 class="digital" style="font-size:5rem">WINNER</h1>
            <h2 id="winner-p" style="font-size:4rem; color: lightgreen;">---</h2>
            <div class="players-columns" id="p-cols"></div>
            <div class="digital" style="font-size:2.5rem">TARGET: <span id="target-ui" style="color:red">00.00</span></div>
        </div>

        <div id="elim-screen" class="screen">
            <h1 class="digital">YOU'VE BEEN</h1>
            <h1 class="digital">ELIMINATED</h1>
            <div class="red-line"></div>
            <h2 id="eliminated-p" style="font-size:3.5rem">---</h2>
        </div>

        <div id="phone-wait-screen" class="screen">
            <h1 style="color:red; font-size: 4rem;">ROUND ENDED</h1>
            <p>MONITOR THE TV FOR RESULTS</p>
            <div id="restart-area-phone" style="display:none; margin-top: 30px;">
                <button class="mode-btn" onclick="resetGame()">RESTART GAME</button>
            </div>
        </div>

        <div id="game-over-screen" class="screen">
            <h1 id="over-msg" class="digital" style="font-size:6rem;">CONGRATULATIONS!</h1>
            <h2 id="survivor-name" style="font-size:5rem; color:red;">---</h2>
            <div id="restart-area-tv" style="display:none; margin-top: 30px;">
                <button class="mode-btn" onclick="resetGame()">RESTART</button>
            </div>
        </div>
    </div>

<script>
    const ABLY_KEY = 'WEUdeg.e-jGzA:u-dLUatgTPRUyLgP--exnIjK_t8UGDRCTsEjE8_PIJo';
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('the-0-8-true-k-diamonds');

    let myRole = '';
    let isChoosing = false;
    let state = { screen: 'setup-screen', players: [], turnIdx: 0, target: 0, winner: '', elimName: '', survivor: '', gameOver: false };

    channel.subscribe('sync', (msg) => {
        if (isChoosing && myRole === 'controller') return;
        state = msg.data;
        render();
    });

    function init(role) {
        myRole = role;
        document.getElementById('role-selector').classList.remove('active');
        if(role === 'tv') document.body.classList.add('is-tv');
        render();
    }

    function pushState(screen, extra = {}) {
        state.screen = screen;
        Object.assign(state, extra);
        channel.publish('sync', state);
    }

    function addPlayer() {
        const n = document.getElementById('p-name').value;
        if(!n) return;
        state.players.push({ name: n, points: 0, choice: null, isDead: false });
        document.getElementById('p-name').value = '';
        pushState('setup-screen');
    }

    function openSecretPad() {
        isChoosing = true;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('pad-screen').classList.add('active');
        const g = document.getElementById('grid'); g.innerHTML = '';
        for(let i=0; i<=100; i++) {
            let d = document.createElement('div'); d.className = 'num-btn'; d.innerText = i;
            d.onclick = () => { document.querySelectorAll('.num-btn').forEach(x=>x.classList.remove('selected')); d.classList.add('selected'); state.tempChoice = i; document.getElementById('lock-btn').disabled = false; };
            g.appendChild(d);
        }
    }

    function submitChoice() {
        state.players[state.turnIdx].choice = state.tempChoice;
        state.turnIdx++; isChoosing = false;
        while(state.players[state.turnIdx] && state.players[state.turnIdx].isDead) state.turnIdx++;
        if(state.turnIdx >= state.players.length) calculate();
        else pushState('turn-screen');
    }

    function calculate() {
        const alive = state.players.filter(p => !p.isDead);
        
        // Calculate Target
        const sum = alive.reduce((a, b) => a + (b.choice || 0), 0);
        const avg = sum / alive.length;
        const target = (avg * 0.8).toFixed(2);

        // REAL LOGIC: Check for duplicates
        const choiceCounts = {};
        alive.forEach(p => choiceCounts[p.choice] = (choiceCounts[p.choice] || 0) + 1);

        // Find Round Winner (Must be UNIQUE and CLOSEST)
        let roundWinnerIdx = -1;
        let minDiff = Infinity;

        state.players.forEach((p, idx) => {
            if (!p.isDead) {
                const isUnique = choiceCounts[p.choice] === 1;
                const diff = Math.abs(p.choice - target);
                
                if (isUnique && diff < minDiff) {
                    minDiff = diff;
                    roundWinnerIdx = idx;
                }
            }
        });

        const roundWinnerName = roundWinnerIdx !== -1 ? state.players[roundWinnerIdx].name : "NO ONE (MATCHED)";

        // DEDUCT POINTS: Everyone except the winner loses 1 point
        let elimPlayer = null;
        state.players.forEach((p, idx) => {
            if (!p.isDead) {
                if (idx !== roundWinnerIdx) {
                    p.points--;
                }
                if (p.points <= -10) {
                    p.isDead = true;
                    elimPlayer = p.name;
                }
            }
        });

        pushState('result-screen', { target: target, winner: roundWinnerName, elimName: elimPlayer });

        setTimeout(() => {
            if (state.elimName) {
                pushState('elim-screen');
                setTimeout(() => checkGameOver(), 5000);
            } else {
                checkGameOver();
            }
        }, 10000);
    }

    function checkGameOver() {
        const survivors = state.players.filter(p => !p.isDead);
        if(survivors.length <= 1) {
            const sName = survivors.length === 1 ? survivors[0].name : "NO ONE";
            pushState('game-over-screen', { survivor: sName, gameOver: true });
        } else {
            nextRound();
        }
    }

    function nextRound() {
        state.players.forEach(p => p.choice = null);
        state.turnIdx = 0;
        while(state.players[state.turnIdx] && state.players[state.turnIdx].isDead) state.turnIdx++;
        pushState('turn-screen');
    }

    function resetGame() { location.reload(); }

    function render() {
        if (isChoosing && myRole === 'controller') return;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        
        let activeId = state.screen;
        if(myRole === 'controller') {
            if(state.gameOver || state.screen === 'result-screen' || state.screen === 'elim-screen') activeId = 'phone-wait-screen';
            if(state.gameOver) document.getElementById('restart-area-phone').style.display = 'block';
        }
        if(myRole === 'tv') {
            if(state.screen === 'pad-screen') activeId = 'turn-screen';
            if(state.gameOver) {
                activeId = 'game-over-screen';
                document.getElementById('restart-area-tv').style.display = 'block';
            }
        }
        document.getElementById(activeId).classList.add('active');

        if(activeId === 'result-screen') {
            document.getElementById('target-ui').innerText = state.target;
            document.getElementById('winner-p').innerText = state.winner;
            document.getElementById('p-cols').innerHTML = state.players.map(p => `
                <div class="player-entry ${p.name === state.winner ? 'winner-glow' : ''}" style="opacity:${p.isDead?0.2:1}">
                    ${p.name}<br>
                    <span class="p-stat">(choices): ${p.choice ?? '--'}</span>
                    <span class="p-stat">(points): ${p.points}</span>
                </div>`).join('');
        }
        if(activeId === 'elim-screen') document.getElementById('eliminated-p').innerText = state.elimName;
        if(activeId === 'game-over-screen') {
            document.getElementById('over-msg').innerText = state.survivor === "NO ONE" ? "NO ONE SURVIVED" : "CONGRATULATIONS";
            document.getElementById('survivor-name').innerText = state.survivor === "NO ONE" ? "" : state.survivor;
        }
        if(state.players[state.turnIdx]) document.getElementById('active-p').innerText = state.players[state.turnIdx].name;
        document.getElementById('p-list').innerHTML = state.players.map(p => `<div style="color:${p.isDead?'#222':'#fff'}">${p.name} [${p.points}]</div>`).join('');
    }
</script>
</body>
</html>
